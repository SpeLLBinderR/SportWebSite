<!doctype html>
<html lang="ru">
<head>
    <script src="https://kit.fontawesome.com/8cc52cc9ed.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">

</head>

<body>

    <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom">
      <h1 class="float-md-start mb-0"><i class="fas fa-carrot"></i>Fitness 4 Life</h1>

      <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto ">
        <a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'homepage' %}">Главная страница</a>
        <a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'coursesPage' %}">Курсы</a>
        <a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'aboutPage' %}">О нас</a>

        <!--<a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'enterPage' %}">LogIn</a> -->

        {% if user.is_authenticated %}
            <a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'createPage' %}">Создать тему</a>
            <a class="me-3 py-2 text-dark text-decoration-none" href="{% url 'advisecreatePage' %}">Создать курс</a>


            <a class="me-3 py-2 fw-bold text-dark text-decoration-none" >
                <i class="fas fa-user"></i> {{ user.get_username }}</a>
            <a class="me-3 py-2 fw-bold" href="{% url 'logout'%}?next={{request.path}}">Выйти</a>
        {% else %}
            <a class="me-3 py-2 fw-bold" href="{% url 'login'%}?next={{request.path}}">Вход</a>
        {% endif %}
      </nav>
    </div>

    <div class="container" >
    {% block content %}{% endblock %}
    </div>


</body>
</html>
