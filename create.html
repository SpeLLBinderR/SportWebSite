{% extends 'main/base.html' %}

{% block title %}
Создание записи
{% endblock %}

{% block content %}
    {% if perms.main.Can_add_task%}
        <h1 align="center" class="bold"> <font face="Times New Roman"><strong>Создание записи</strong></font></h1><br>
        <form method="post" >
            {% csrf_token %}
            {{ form.title }}<br>
            {{ form.task }}<br>
            <button type="submit" class="btn btn-success">Добавить</button>
            <span>{{error}}</span>
        </form>
    {% else %}
         <h1 align="center"> <font face="Times New Roman"><strong>У вас нет доступа к созданию записей
         </strong></font></h1><br>
    {% endif %}
{% endblock %}
